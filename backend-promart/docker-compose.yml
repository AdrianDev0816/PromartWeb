services:
  mysql:
    image: mysql:8.0
    container_name: db_inventario_promart
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_inventario_promart
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  inventario-api:
    build: .
    container_name: ms-inventory-management
    restart: always
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/db_inventario_promart
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
